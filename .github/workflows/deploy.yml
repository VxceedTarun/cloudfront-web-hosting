name: Deploy to S3

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name static-site-cloudfront-stack \
            --template-file cloudfront-static-site.yaml \
            --parameter-overrides BucketName=${{ secrets.S3_BUCKET_NAME }} \
            --capabilities CAPABILITY_IAM

      - name: Get stack outputs
        id: stack-outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name static-site-cloudfront-stack \
            --query "Stacks[0].Outputs[?OutputKey=='BucketNameOutput'].OutputValue" --output text)
          DIST_ID=$(aws cloudformation describe-stacks --stack-name static-site-cloudfront-stack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Upload to S3
        run: aws s3 sync . s3://${{ steps.stack-outputs.outputs.bucket }} --exclude ".git/*" --exclude ".github/*" --exclude "cloudfront-static-site.yaml"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.stack-outputs.outputs.dist_id }} --paths "/*"
